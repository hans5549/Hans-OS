name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-production
  cancel-in-progress: true

env:
  NODE_VERSION: "22.22.0"
  PNPM_VERSION: "10.28.2"
  FRONTEND_WORKDIR: frontend
  FRONTEND_DIST_PATH: frontend/apps/web-antd/dist

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Validate frontend deployment settings
        env:
          FRONTEND_API_URL: ${{ vars.FRONTEND_API_URL }}
        run: |
          if [ -z "$FRONTEND_API_URL" ]; then
            echo "Repository variable FRONTEND_API_URL is required." >&2
            exit 1
          fi

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_WORKDIR }}
        run: pnpm install --frozen-lockfile

      - name: Write production API URL
        env:
          FRONTEND_API_URL: ${{ vars.FRONTEND_API_URL }}
        run: |
          cat <<EOF > frontend/apps/web-antd/.env.production.local
          VITE_GLOB_API_URL=${FRONTEND_API_URL}
          EOF

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_WORKDIR }}
        run: pnpm run build:antd

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_DIST_PATH }}
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate Azure deployment token
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$AZURE_STATIC_WEB_APPS_API_TOKEN" ]; then
            echo "Repository secret AZURE_STATIC_WEB_APPS_API_TOKEN is required." >&2
            exit 1
          fi

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_DIST_PATH }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.FRONTEND_DIST_PATH }}
          output_location: ""
          skip_app_build: true
