name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-production
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"
  PUBLISH_PATH: backend/publish

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore backend/CGMSportFinance.sln

      - name: Build
        run: dotnet build backend/CGMSportFinance.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/CGMSportFinance.sln --configuration Release --no-build --verbosity minimal

      - name: Publish API
        run: dotnet publish backend/src/CGMSportFinance.Api/CGMSportFinance.Api.csproj --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    needs: build-test-publish
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.PUBLISH_PATH }}

      - name: Validate Azure deployment settings
        env:
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_WEBAPP_NAME" ]; then
            echo "Repository variable AZURE_WEBAPP_NAME is required." >&2
            exit 1
          fi

          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "Repository secret AZURE_WEBAPP_PUBLISH_PROFILE is required." >&2
            exit 1
          fi

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_PATH }}

      - name: Health check
        run: curl --fail --retry 5 --retry-delay 5 "https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
