name: Deploy Backend
on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: dotnet build backend/HansOS.slnx -c Release

      - run: dotnet test backend/HansOS.slnx -c Release --no-build

      - run: dotnet publish backend/src/HansOS.Api/HansOS.Api.csproj -c Release -o ./publish

      - uses: Azure/webapps-deploy@v2
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

      - name: Health Check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.AZURE_WEBAPP_HEALTHCHECK_URL }}" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1
