name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'backend/src/HansOS.Api/HansOS.Api.csproj'
  SOLUTION_PATH: 'backend/HansOS.slnx'
  AZURE_WEBAPP_NAME: 'hans-os-api'
  AZURE_RESOURCE_GROUP: 'hans-azure-resoure'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore -c Release

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --no-build -c Release --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --no-build -c Release -o ./publish

      - name: Zip artifact
        run: zip -r release.zip ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: release.zip

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --settings \
              "Jwt__SigningKey=${{ secrets.JWT_SIGNING_KEY }}" \
              "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}" \
              "IdentitySeed__AdminPassword=${{ secrets.IDENTITY_SEED_ADMIN_PASSWORD }}" \
              "Frontend__AllowedOrigins__0=https://green-coast-01b10a200.1.azurestaticapps.net" \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "WEBSITE_RUN_FROM_PACKAGE=1"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --src-path release.zip \
            --type zip
